<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>百年前新聞</title>
  <link rel="icon" href="/icon.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#111827" />
</head>
<body>
  <header class="paper-header">
    <p class="edition">創刊 Web 版</p>
    <h1>百年前新聞</h1>
    <p class="sub">大正・昭和初期のニュースを、現代の読みやすさで。</p>
  </header>

  <section class="top-bar card">
    <div class="search-group">
      <input id="searchInput" type="search" placeholder="キーワード・あいまい検索" />
      <select id="sortSelect">
        <option value="dateDesc">新しい順</option>
        <option value="dateAsc">古い順</option>
      </select>
    </div>
    <div class="session-group">
      <span id="pointBadge" class="badge">ポイント: 0</span>
      <button id="loginBtn" class="btn">ログイン</button>
      <button id="logoutBtn" class="btn ghost hidden">ログアウト</button>
    </div>
  </section>

  <section class="genres-wrap card">
    <h2>ジャンル</h2>
    <div id="genres" class="genres" role="tablist" aria-label="ジャンル"></div>
  </section>

  <main class="layout">
    <section class="main-column">
      <div class="toolbar card">
        <h2>記事一覧</h2>
        <p id="newNotice" class="notice hidden"></p>
      </div>
      <div id="articleList" class="article-list"></div>
      <div id="sentinel" class="sentinel"></div>
      <p id="emptyState" class="empty hidden">該当する記事が見つかりません。</p>
    </section>

    <aside class="side-column">
      <section class="card">
        <h3>タグで絞り込み（複数選択）</h3>
        <div class="actions">
          <button id="clearTagsBtn" class="btn ghost">タグをクリア</button>
        </div>
        <div id="tagList" class="tag-list"></div>
      </section>

      <section class="card">
        <h3>お気に入り</h3>
        <ul id="favoriteList" class="mini-list"></ul>
      </section>
    </aside>
  </main>

  <dialog id="loginDialog">
    <form method="dialog" id="loginForm">
      <h3>ログイン</h3>
      <input id="usernameInput" required placeholder="ユーザー名" />
      <menu>
        <button value="cancel" class="btn ghost">キャンセル</button>
        <button value="default" class="btn">ログイン</button>
      </menu>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
