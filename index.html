<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>百年前新聞</title>
    <link rel="icon" href="/icon.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#111827" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">1920s - 1940s Archive</p>
        <h1>百年前新聞</h1>
      </div>
      <p class="subtitle">百年前の紙面を、現代の読みやすさで。</p>
      <nav class="top-nav">
        <button class="top-nav-btn active" data-view="home">ホーム</button>
        <button class="top-nav-btn" data-view="tags">タグ一覧</button>
        <button class="top-nav-btn" data-view="gallery">画像ページ</button>
        <button class="top-nav-btn" data-view="mypage">マイページ</button>
      </nav>
    </header>

    <main class="layout" id="homeView">
      <section class="main-pane">
        <form class="controls" onsubmit="return false;">
          <label class="sr-only" for="searchInput">記事検索</label>
          <input id="searchInput" type="search" placeholder="キーワード検索（あいまい一致）" />

          <label class="sr-only" for="sortSelect">並び替え</label>
          <select id="sortSelect">
            <option value="dateDesc">新しい順</option>
            <option value="dateAsc">古い順</option>
          </select>
        </form>

        <div class="genre-strip-wrap">
          <div id="genreStrip" class="genre-strip" role="tablist" aria-label="ジャンル"></div>
        </div>

        <div id="statusLine" class="status-line"></div>
        <div id="newsList" class="news-list"></div>
        <div id="sentinel" class="sentinel"></div>
      </section>

      <aside class="side-pane">
        <section class="card">
          <h2>タグで絞り込み</h2>
          <div class="tag-toolbar">
            <button id="clearTagsBtn" type="button" class="ghost">クリア</button>
            <button id="goTagsPageBtn" type="button" class="ghost">すべてのタグを見る</button>
          </div>
          <p class="hint">よく使われる上位10件を表示中</p>
          <div id="selectedTags" class="selected-tags"></div>
          <div id="tagCloud" class="tag-cloud"></div>
        </section>
      </aside>
    </main>

    <section id="tagsView" class="view hidden">
      <div class="view-card">
        <h2>タグ一覧</h2>
        <p class="hint">タグを押すとホームへ戻って絞り込みます。</p>
        <div id="allTagsList" class="tag-cloud large"></div>
      </div>
    </section>

    <section id="galleryView" class="view hidden">
      <div class="view-card">
        <h2>画像ページ</h2>
        <p class="hint">スクロールで次の画像へ。画像クリックで拡大できます。</p>
        <div id="galleryFeed" class="gallery-feed"></div>
        <div id="gallerySentinel" class="sentinel"></div>
      </div>
    </section>

    <section id="mypageView" class="view hidden">
      <div class="view-card">
        <h2>マイページ</h2>
        <p id="favoriteSummary" class="hint"></p>
        <div id="favoriteList" class="news-list"></div>
      </div>
    </section>

    <div id="imageModal" class="image-modal hidden" role="dialog" aria-modal="true">
      <button id="closeModalBtn" class="modal-close" type="button">閉じる ×</button>
      <img id="modalImage" src="" alt="拡大画像" />
    </div>

    <template id="articleTemplate">
      <article class="article-card">
        <div class="article-meta">
          <span class="genre-pill"></span>
          <time class="article-date"></time>
        </div>
        <h3 class="article-title"></h3>
        <button class="favorite-btn" type="button">☆ お気に入り</button>
        <img class="article-image hidden" alt="記事画像" loading="lazy" />
        <p class="article-snippet"></p>
        <div class="article-tags"></div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
